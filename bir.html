<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
    <title>Leonardo Tatulus | Mobile Developer | Project Page</title>
    
    <!-- Add some coding keywords below, Ex: (javascript, yourusername, etc) -->
    <meta name="keywords" content="[username], [name], skill" />
    
    <!-- Improve your SEO by adding a small descrption of you -->
    <meta name="description" content="Leonardo Tatulus | Mobile Developer" />
    
    <!-- Add a your png Logo to the assets folder and change the href attr accordingly  -->
    <link rel="icon" type="image/png" href="./assets/devfolio-logo.png" />
    
    <!-- Add your primary-theme color for the value of content -->
    <meta name="theme-color" content="#36d1dc" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <!-- Fill content with the URL of this portfolio you'll host -->
    <meta property="og:url" content="https://leonardo041998.github.io/leonardotatulus/" />
    <!-- Fill content with the title of your portfolio(Recommended to use what you put in <title> tag) -->
    <meta property="og:title" content="Leonardo Tatulus | Mobile Developer" />
    <!-- Give a short description that'll show up when you/someone shares your portfolio on different platform -->
    <meta property="og:description" content="Hello, I'm Leo and this is my portfolio" />
    <!-- Add a thumbnail image in assets folder and fill the content attr with URL to that thumbnail 
          so that a thumbnail image of your portfolio is shown while shared on other platform -->
    <meta property="og:image" content="https://leonardo041998.github.io/leonardotatulus/assets/porfolioleo.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <!-- Again fill content attr with the URL of this portfolio you'll host -->
    <meta property="twitter:url" content="https://leonardo041998.github.io/leonardotatulus/" />
    <!-- Recommended to use the same text used within <title> element -->
    <meta property="twitter:title" content="Leonardo Tatulus | Mobile Developer" />
    <!-- short description that shows up while your portfolio is shared -->
    <meta property="twitter:description" content="Hello, I'm Leo and this is my portfolio" />
    <!-- Fill content with the URL to the thumbnail image that you'll put in the assets folder -->
    <meta property="twitter:image" content="https://leonardo041998.github.io/leonardotatulus/assets/porfolioleo.png" />
    
    <!-- link tags -->
    <link rel="preload" as="style" href="./css/main.css" />
    <link rel="stylesheet" href="./css/main.css" />
    
    <!-- FontAwesome Icons link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css"
        integrity="sha512-SzlrxWUlpfuzQ+pcUCosxcglQRNAq/DZjVsC0lE40xsADsfeQoEypE+enwcOiGjk/bSuGGKHEyjSoQ1zVisanQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script defer src="./javascript/scrollreveal.min.js"></script>
    <script defer type="text/javascript" src="./javascript/scrollveal.js"></script>
    
    <!-- Remove Google Analytics once you have your portfolio website set-up -->
    <!-- Global site tag (gtag.js) - Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-122228201-4"></script>
    <script>
        window.dataLayer = window.dataLayer || []
        function gtag() {
            dataLayer.push(arguments)
        }
        gtag("js", new Date())

        gtag("config", "UA-122228201-4")
    </script>

    <style>
        /* CSS styling for the project page */
        .project-wrapper__text-btns {
            text-align: center;
            margin-top: 20px;
        }

        .project-wrapper__content {
            display: none;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .project-wrapper__content img,
        .project-wrapper__content video {
            max-width: auto;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="project-wrapper__text-btns">
        <a href="#" id="seeLiveBtn" class="cta-btn cta-btn--hero cta-btn--projects">See Live</a>
    </div>

    <div class="project-wrapper__content" id="projectContent">
        <img src="./assets/bir.png" alt="Project Screenshot" id="projectImage" width="">
        <img src="./assets/bir.png" alt="Project Screenshot" id="projectImage">
        <video controls id="projectVideo">
            <source src="https://www.youtube.com/watch?v=ByAn8DF8Ykk" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <script>
        // JavaScript to handle the click event on the "See Live" button
        const seeLiveBtn = document.getElementById('seeLiveBtn');
        const projectContent = document.getElementById('projectContent');
        const projectImage = document.getElementById('projectImage');
        const projectVideo = document.getElementById('projectVideo');

        seeLiveBtn.addEventListener('click', function (event) {
            event.preventDefault();

            // Simulate loading data (replace with actual data loading)
            const imageData = 'path_to_image.jpg';
            const videoData = 'path_to_video.mp4';

            // Update the content with the image and video
            projectImage.src = imageData;
            projectVideo.src = videoData;

            // Show the project content
            projectContent.style.display = 'flex';
        });
    </script>
    <script src="./javascript/vanilla-tilt.min.js"></script>
    <script type="text/javascript" src="./javascript/valtilt.js"></script>
</body>

</html>
